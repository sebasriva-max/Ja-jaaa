<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Why not?</title>
  <meta property="og:title" content="Why not?" />
  <meta property="og:type" content="website" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #invite-wrap {
      max-width: 420px;
      width: 90%;
      padding: 2rem 2rem 2.5rem;
      background: #ffffff;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 12px;
      min-height: 260px;
      position: relative;
      text-align: center;
    }
    .big {
      font-size: 22px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 0.6rem;
    }
    .line {
      font-size: 15px;
      color: #1a1a1a;
      line-height: 1.75;
    }
    .line.muted {
      color: #6b6b6b;
      font-size: 14px;
    }
    .spacer { height: 1rem; }
    .forecast-badge {
      display: inline-block;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 99px;
      background: #f1efea;
      color: #6b6b6b;
      border: 0.5px solid rgba(0,0,0,0.1);
      margin-top: 1rem;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    #invite-wrap { animation: fadeUp 0.5s ease forwards; }
  </style>
</head>
<body>
  <div id="invite-wrap">
    <div class="big">That was a one-time offer</div>
    <div class="spacer"></div>
    <div class="line">No worries though — it'll just have to happen spontaneously sometime.</div>
  </div>
</body>
</html>
